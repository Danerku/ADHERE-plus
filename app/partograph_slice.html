<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADHERE+ — partograph slice</title>
<style>
:root{--surface-2:#fff;--surface-1:#f6f5f1;--border:#dcd9d2;--text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#8a8880;--radius:8px;--bg-success:#e1f5ee;--text-success:#0f6e56;--bg-warning:#faeeda;--text-warning:#854f0b;--bg-danger:#fcebeb;--text-danger:#a32d2d;}
*{box-sizing:border-box;font-family:system-ui,Arial,sans-serif}
body{margin:0;padding:20px;color:var(--text-primary);background:#faf9f5;max-width:720px}
input{height:34px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 8px;font-size:14px}
button{height:36px;border:0.5px solid #9a988f;background:transparent;border-radius:var(--radius);padding:0 12px;font-size:14px;cursor:pointer}
button:hover{background:var(--surface-1)}
label{display:block}
</style></head><body>
<h3>ADHERE+ — register → partograph → AI score (preview)</h3>
<div id="reg" style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px">
  <p style="font-weight:600;margin:0 0 8px">Register / admit to labour</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">
    <label style="font-size:13px;color:var(--text-secondary)">MRN<input id="mrn" value="0555123" style="width:100%"></label>
    <label style="font-size:13px;color:var(--text-secondary)">Name<input id="nm" value="Test Woman" style="width:100%"></label>
    <label style="font-size:13px;color:var(--text-secondary)">Age<input id="age" type="number" value="24" style="width:100%"></label>
    <label style="font-size:13px;color:var(--text-secondary)">Gravida<input id="grav" type="number" value="2" style="width:100%"></label>
    <label style="font-size:13px;color:var(--text-secondary)">Para<input id="par" type="number" value="1" style="width:100%"></label>
  </div>
  <button id="admit" style="margin-top:10px">Admit to labour</button>
</div>
<div id="ward" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
    <p id="phdr" style="font-weight:600;margin:0"></p>
    <span id="band" style="font-size:13px;font-weight:600;padding:4px 12px;border-radius:var(--radius)"></span>
  </div>
  <div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px">
    <p style="font-weight:600;margin:0 0 8px">Add observation</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px">
      <label style="font-size:13px;color:var(--text-secondary)">Hours active<input id="hrs" type="number" step="0.5" value="1" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Cervix cm<input id="cvx" type="number" step="0.5" value="5" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Fetal HR<input id="fhr" type="number" value="140" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Contr./10<input id="ctx" type="number" value="3" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Moulding<input id="mld" type="number" value="0" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Systolic BP<input id="sbp" type="number" value="118" style="width:100%"></label>
      <label style="font-size:13px;color:var(--text-secondary)">Temp C<input id="tmp" type="number" step="0.1" value="37" style="width:100%"></label>
    </div>
    <button id="plot" style="margin-top:10px">Record and score</button>
  </div>
  <div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px">
    <p style="font-weight:600;margin:0 0 6px">Cervicograph (WHO alert / action)</p>
    <svg id="pg" viewBox="0 0 640 300" width="100%"></svg>
    <div id="aiwrap" style="display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px">
      <span style="font-size:13px;color:var(--text-secondary)">On-device AI risk</span>
      <span id="prob" style="font-size:22px;font-weight:600;margin:0 8px"></span>
      <span id="drivers" style="font-size:12px;color:var(--text-muted)"></span>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button id="ack">Acknowledge</button><button id="ovr">Override</button>
        <span id="hitl" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
    </div>
  </div>
</div>
<script>
var obs=[],W=640,H=300,mL=48,mR=16,mT=16,mB=36,maxH=12,yMin=4,yMax=10;
function x(h){return mL+(h/maxH)*(W-mL-mR)}function y(c){return mT+(1-(c-yMin)/(yMax-yMin))*(H-mT-mB)}
function sig(z){return 1/(1+Math.exp(-z))}
function score(o){var rate=o.hrs>0?(o.cvx-4)/o.hrs:1;var z=-1.6+1.4*(rate<0.7)+1.2*((o.fhr<110)||(o.fhr>170))+0.9*(o.mld>=2)+0.8*(o.sbp>=140)+0.6*(o.tmp>=38)+0.5*(o.ctx<2)+0.4*(o.hrs>8);var d=[];if(rate<0.7)d.push("slow progress");if(o.fhr<110||o.fhr>170)d.push("abnormal FHR");if(o.mld>=2)d.push("moulding");if(o.sbp>=140)d.push("raised BP");if(o.tmp>=38)d.push("fever");if(o.ctx<2)d.push("weak contractions");return{p:sig(z),drivers:d}}
function bandOf(p){return p>=0.66?"red":(p>=0.33?"amber":"green")}
var col={green:{bg:"var(--bg-success)",tx:"var(--text-success)"},amber:{bg:"var(--bg-warning)",tx:"var(--text-warning)"},red:{bg:"var(--bg-danger)",tx:"var(--text-danger)"}};
function draw(){var s='';s+='<rect x="'+mL+'" y="'+mT+'" width="'+(W-mL-mR)+'" height="'+(H-mT-mB)+'" fill="var(--bg-success)"/>';s+='<polygon points="'+x(0)+','+y(4)+' '+x(6)+','+y(10)+' '+x(maxH)+','+y(10)+' '+x(maxH)+','+y(4)+'" fill="var(--bg-warning)"/>';s+='<polygon points="'+x(4)+','+y(4)+' '+x(10)+','+y(10)+' '+x(maxH)+','+y(10)+' '+x(maxH)+','+y(4)+'" fill="var(--bg-danger)"/>';for(var c=4;c<=10;c++){s+='<line x1="'+mL+'" y1="'+y(c)+'" x2="'+(W-mR)+'" y2="'+y(c)+'" stroke="var(--border)"/>';s+='<text x="'+(mL-8)+'" y="'+(y(c)+4)+'" text-anchor="end" font-size="11" fill="var(--text-muted)">'+c+'</text>'}for(var h=0;h<=maxH;h+=2){s+='<text x="'+x(h)+'" y="'+(H-mB+18)+'" text-anchor="middle" font-size="11" fill="var(--text-muted)">'+h+'</text>'}s+='<line x1="'+x(0)+'" y1="'+y(4)+'" x2="'+x(6)+'" y2="'+y(10)+'" stroke="#BA7517" stroke-width="2"/><text x="'+(x(3)+6)+'" y="'+y(7.4)+'" font-size="11" fill="#854F0B">Alert</text>';s+='<line x1="'+x(4)+'" y1="'+y(4)+'" x2="'+x(10)+'" y2="'+y(10)+'" stroke="#A32D2D" stroke-width="2"/><text x="'+(x(7)+6)+'" y="'+y(7.4)+'" font-size="11" fill="#791F1F">Action</text>';var pts=obs.map(function(o){return x(o.hrs)+','+y(Math.max(4,Math.min(10,o.cvx)))});if(pts.length>1)s+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--text-primary)" stroke-width="1.5"/>';obs.forEach(function(o){s+='<text x="'+x(o.hrs)+'" y="'+(y(Math.max(4,Math.min(10,o.cvx)))+5)+'" text-anchor="middle" font-size="14" font-weight="600" fill="var(--text-primary)">X</text>'});document.getElementById('pg').innerHTML=s}
document.getElementById('admit').onclick=function(){document.getElementById('ward').style.display='block';document.getElementById('reg').style.opacity='0.6';document.getElementById('phdr').textContent=document.getElementById('nm').value+' · MRN '+document.getElementById('mrn').value+' · G'+document.getElementById('grav').value+' P'+document.getElementById('par').value+' · laboring';draw()};
document.getElementById('plot').onclick=function(){var o={hrs:+hrs.value,cvx:+cvx.value,fhr:+fhr.value,ctx:+ctx.value,mld:+mld.value,sbp:+sbp.value,tmp:+tmp.value};obs.push(o);obs.sort(function(a,b){return a.hrs-b.hrs});draw();var r=score(o),b=bandOf(r.p);var bd=document.getElementById('band');bd.textContent=(b==='red'?'RED — act now':b==='amber'?'AMBER — reassess':'GREEN — normal');bd.style.background=col[b].bg;bd.style.color=col[b].tx;document.getElementById('aiwrap').style.display='block';var pr=document.getElementById('prob');pr.textContent=(r.p*100).toFixed(0)+'%';pr.style.color=col[b].tx;document.getElementById('drivers').textContent=r.drivers.length?('drivers: '+r.drivers.join(', ')):'no adverse drivers';document.getElementById('hitl').textContent='';document.getElementById('hrs').value=(o.hrs+1)};
document.getElementById('ack').onclick=function(){document.getElementById('hitl').textContent='acknowledged and logged'};
document.getElementById('ovr').onclick=function(){document.getElementById('hitl').textContent='override recorded with reason (logged)'};
</script></body></html>
