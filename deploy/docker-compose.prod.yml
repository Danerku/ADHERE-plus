# Docker's json-file logs grow without bound. On a 25 GB droplet that is a slow disk-full — which
# takes the database down with it. Every service caps its logs.
x-logging: &logs
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

services:
  db:
    image: mysql:8.0
    restart: always
    logging: *logs
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?set in .env}
      MYSQL_DATABASE: ${DB_NAME:-adhere}
      MYSQL_USER: ${DB_USER:-adhere}
      MYSQL_PASSWORD: ${DB_PASS:?set in .env}
    volumes:
      - ../docker/init:/docker-entrypoint-initdb.d:ro
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
  web:
    build: { context: .., dockerfile: docker/Dockerfile }
    restart: always
    logging: *logs
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-adhere}
      DB_USER: ${DB_USER:-adhere}
      DB_PASS: ${DB_PASS:?set in .env}
      SITE_DOMAIN: ${SITE_DOMAIN}
      # Clinic-local time. PHP pins itself to this (config.php) and pins the MySQL session to
      # the matching offset (db.php), so date(), NOW() and CURDATE() all resolve on the clock
      # the provider is looking at. Override per country if ADHERE+ is deployed elsewhere.
      APP_TZ: ${APP_TZ:-Africa/Addis_Ababa}
      TZ: ${APP_TZ:-Africa/Addis_Ababa}
    depends_on:
      db: { condition: service_healthy }
    volumes:
      - sessions:/var/adhere-sessions
    # `restart: always` only catches a process that EXITS. An Apache that is still running but has
    # stopped answering — worker exhaustion, a wedged pool — would sit there serving nothing while
    # Docker considered it healthy. This actually asks it.
    healthcheck:
      test: ["CMD-SHELL","php -r 'exit(@file_get_contents(\"http://127.0.0.1/index.html\")?0:1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  caddy:
    image: caddy:2
    restart: always
    logging: *logs
    ports: ["80:80","443:443"]
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?e.g. partograph.epichealthsystems.org}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Other projects on this droplet (e.g. hub.epichealthsystems.org) keep their Caddy
      # config in their OWN files here, OUTSIDE the ADHERE+ repo. The Caddyfile imports
      # them. This is what stops an ADHERE+ `git pull` from clobbering another project —
      # and stops another project's config from blocking an ADHERE+ deploy.
      - /srv/caddy-sites:/etc/caddy/conf.d:ro
      - caddydata:/data
    depends_on: [web]
volumes: { dbdata: {}, caddydata: {}, sessions: {} }
